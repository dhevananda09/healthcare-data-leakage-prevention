<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Healthcare AI Security</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f172a,#2563eb);
    height:100vh;
}

.login-card{
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.system-title{
    font-weight:600;
    color:#0f172a;
}
</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card login-card p-4 col-md-4">

<div class="text-center mb-4">
<i class="bi bi-shield-lock-fill text-primary" style="font-size:45px;"></i>
<h3 class="system-title mt-2">AI Healthcare Security</h3>
<p class="text-muted">Secure Data Access Monitoring System</p>
</div>

{% if error %}
<div class="alert alert-danger text-center">
    {{ error }}
</div>
{% endif %}

<form method="POST">

<input name="username" class="form-control mb-3" placeholder="Username" required>
<input name="password" type="password" class="form-control mb-3" placeholder="Password" required>
<input name="email" type="email" class="form-control mb-3" placeholder="Email" required>

<!-- 🔥 ADD THIS (important for your new backend) -->
<select name="otp_method" class="form-select mb-3">
    <option value="email">Email OTP</option>
    <option value="totp">Authenticator App (Offline)</option>
</select>

<button class="btn btn-primary w-100">
Login Securely
</button>

</form>

<hr>

<p class="text-center text-muted small">
AI-Based Healthcare Data Leakage Prevention System<br>
Developed by Dhevananda TV
</p>

</div>
</div>

</body>
</html>
