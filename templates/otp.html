<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>OTP Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f172a,#2563eb);
    height:100vh;
}

.card{
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.timer{
    font-weight:500;
    color:#6b7280;
}
</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 col-md-4 text-center">

<i class="bi bi-shield-lock-fill text-primary" style="font-size:40px;"></i>

<h3 class="mt-2">OTP Verification</h3>

<!-- 🔥 ADD THIS -->
<p class="text-muted small">
OTP has been sent to your registered email
</p>

{% if error %}
<div class="alert alert-danger mt-2">{{ error }}</div>
{% endif %}

<form method="POST" class="mt-3">
<input name="otp" class="form-control mb-3" placeholder="Enter OTP" required>
<button class="btn btn-success w-100">Verify OTP</button>
</form>

<!-- EMAIL OTP -->
{% if method == "email" %}

<p id="timer" class="timer mt-3 text-dark"></p>

<!-- 🔥 FIXED BUTTON -->
<button id="resendBtn"
        class="btn btn-secondary btn-sm mt-2"
        disabled>
Resend OTP
</button>

<script>
let expiry = "{{ expiry_time }}";

if (expiry){
    let end = new Date(expiry).getTime();

    let x = setInterval(function(){
        let now = new Date().getTime();
        let dist = end - now;

        if (dist <= 0){
            clearInterval(x);

            document.getElementById("timer").innerHTML = "OTP Expired";

            // 🔥 ENABLE BUTTON
            let btn = document.getElementById("resendBtn");
            btn.disabled = false;
            btn.classList.remove("btn-secondary");
            btn.classList.add("btn-warning");

            btn.onclick = function(){
                window.location.href = "/resend_otp";
            };

        } else {
            let sec = Math.floor((dist % (1000*60))/1000);

            document.getElementById("timer").innerHTML =
                "Expires in: " + sec + " sec";
        }
    },1000);
}
</script>

{% endif %}

<!-- TOTP -->
{% if method == "totp" %}

<p id="totp_timer" class="timer mt-3 text-light"></p>

<p class="text-light small">
Enter OTP from your authenticator app
</p>

<a href="/setup_totp" class="btn btn-warning btn-sm mt-2">
Setup QR (First Time)
</a>

<script>
function totpTimer(){
    let time = Math.floor(Date.now()/1000);
    let remaining = 30 - (time % 30);

    document.getElementById("totp_timer").innerHTML =
        "New OTP in: " + remaining + " sec";
}

setInterval(totpTimer,1000);
</script>

{% endif %}

</div>

</div>

</body>
</html>
