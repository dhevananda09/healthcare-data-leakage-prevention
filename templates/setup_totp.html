<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>TOTP Setup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f172a,#2563eb);
    height:100vh;
}

.card{
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 col-md-4 text-center">

<i class="bi bi-phone text-warning" style="font-size:40px;"></i>

<h3 class="mt-2">Setup Authenticator</h3>

<p class="text-muted">
Scan this QR code using your authenticator app
</p>

<img src="/static/qr.png" width="200" class="my-3">

<p class="small text-muted">
Use Google Authenticator or Microsoft Authenticator
</p>

<a href="/otp" class="btn btn-success w-100 mt-2">
Continue to OTP
</a>

</div>

</div>

</body>
</html>
